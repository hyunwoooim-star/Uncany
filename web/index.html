<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="학교 커뮤니티 플랫폼 - 교사들을 위한 리소스 예약 시스템">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts 최적화: 폰트 로딩 속도 개선 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="uncany">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Uncany - 학교 커뮤니티 플랫폼</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* 로딩 화면 스타일 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FAFAFA;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #loading-logo {
      font-size: 48px;
      font-weight: bold;
      color: #3182F6;
      margin-bottom: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E5E8EB;
      border-top-color: #3182F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Flutter 앱 로드 시 페이드아웃 */
    body.loaded #loading {
      opacity: 0;
      transition: opacity 0.3s ease-out;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- 로딩 화면 -->
  <div id="loading">
    <div id="loading-logo">Uncany</div>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Flutter 앱 로드 완료 시 로딩 화면 제거
    window.addEventListener('flutter-first-frame', function() {
      document.body.classList.add('loaded');
      setTimeout(function() {
        const loadingEl = document.getElementById('loading');
        if (loadingEl) loadingEl.remove();
      }, 300);
    });
  </script>
</body>
</html>
